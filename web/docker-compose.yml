# Web stack (from this `web/` directory):
#   cd web && docker compose up --build
#
# Postgres holds all API data. If the fact table is empty, the backend entrypoint
# loads CSVs from ../data_science/data (mounted read-only at /import).
#
# URLs: UI http://localhost:8080 | API http://localhost:8000 | Postgres localhost:5432

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smadex
      POSTGRES_PASSWORD: smadex
      POSTGRES_DB: smadex
    ports:
      - "5432:5432"
    volumes:
      - smadex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smadex -d smadex"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://smadex:smadex@postgres:5432/smadex
      IMPORT_DATA_DIR: /import
      # Optional: if set, the AI agent must send the same value as X-Agent-Token to POST /api/agent/sql
      AGENT_SQL_TOKEN: ${AGENT_SQL_TOKEN:-}
    volumes:
      - ../data_science/data:/import:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Google @google/genai (Gemma 4) + runSQL; proxies SQL to backend. Native codeExecution tool in agent.
  ai-agent:
    build:
      context: .
      dockerfile: ai-agent/Dockerfile
    environment:
      PORT: 3001
      BACKEND_URL: http://backend:8000
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-gemma-4-31b-it}
      # "false" / "0" = disable Google Python code execution (SQL + schema only; helps if you see NOT_FOUND with Gemma+tools)
      ENABLE_CODE_EXECUTION: ${ENABLE_CODE_EXECUTION:-}
      AGENT_SQL_TOKEN: ${AGENT_SQL_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
      ai-agent:
        condition: service_healthy

volumes:
  smadex_pgdata:

# Smadex hackathon stack: UI on http://localhost:8080 (nginx proxies /api -> backend)
# Requires ./data with CSVs (same layout as local dev).
#
# Usage:
#   docker compose up --build
#   Open http://localhost:8080
#
# Optional: expose API directly at http://localhost:8000 (see ports on backend)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SMADEX_DATA_DIR: /data
    volumes:
      - ./data:/data:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
